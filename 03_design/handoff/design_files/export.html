<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Export · 화면 렌더링용</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif;
    background: #f0eee9;
    color: #0B1929;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  #stage { display: inline-block; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="stage"></div>

<script type="text/babel" src="src/tokens.jsx"></script>
<script type="text/babel" src="src/atoms.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/Login.jsx"></script>
<script type="text/babel" src="src/Dashboard.jsx"></script>
<script type="text/babel" src="src/AuctionListGrid.jsx"></script>
<script type="text/babel" src="src/AuctionListRow.jsx"></script>
<script type="text/babel" src="src/AuctionListTimeline.jsx"></script>
<script type="text/babel" src="src/AuctionDetail.jsx"></script>
<script type="text/babel" src="src/BidInteractions.jsx"></script>
<script type="text/babel" src="src/MyActivity.jsx"></script>
<script type="text/babel" src="src/Dividend.jsx"></script>
<script type="text/babel" src="src/AdminOps.jsx"></script>
<script type="text/babel" src="src/AdminLedger.jsx"></script>

<script type="text/babel">
  // Mount whichever screen is requested via ?screen=NAME (or via window.renderScreen(NAME))
  const SCREENS = {
    'login':             () => <Login p={PALETTES.cobalt} />,
    'login-standard':    () => <LoginStandard p={PALETTES.cobalt} />,
    'dashboard':         () => <Dashboard p={PALETTES.cobalt} />,
    'auction-grid':      () => <AuctionListGrid p={PALETTES.cobalt} />,
    'auction-row':       () => <AuctionListRow p={PALETTES.cobalt} />,
    'auction-timeline':  () => <AuctionListTimeline p={PALETTES.cobalt} />,
    'auction-detail':    () => <AuctionDetail p={PALETTES.cobalt} />,
    'bid-interactions':  () => <BidInteractions p={PALETTES.cobalt} />,
    'activity':          () => <MyActivity p={PALETTES.cobalt} />,
    'dividend':          () => <Dividend p={PALETTES.cobalt} />,
    'admin-ops':         () => <AdminOps p={PALETTES.cobalt} />,
    'admin-ledger':      () => <AdminLedger p={PALETTES.cobalt} />,
  };
  const root = ReactDOM.createRoot(document.getElementById('stage'));
  function render(name) {
    const fn = SCREENS[name] || SCREENS['dashboard'];
    root.render(fn());
  }
  window.renderScreen = render;
  window.SCREEN_LIST = Object.keys(SCREENS);
  const params = new URLSearchParams(window.location.search);
  render(params.get('screen') || 'dashboard');
</script>
</body>
</html>
