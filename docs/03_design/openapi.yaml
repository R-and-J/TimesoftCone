openapi: 3.0.3

info:
  title: 사내 연차 경매 시스템 API
  description: |
    B2E Escrow & Dividend 모델 기반 연차 경매 플랫폼의 정식 REST API 명세.

    - 인증: Bearer JWT (SSO 발급)
    - 모든 응답은 `ApiSuccess` 또는 `ApiError` 봉투(envelope)로 감싸짐
    - 내부 호출 엔드콘(`/internal/*`)는 `X-Internal-Token` 헤더 필수 — 외부 노출 금지
    - 권한 검증은 `permission-matrix.md` 1:1 매핑
  version: 0.1.0
  contact:
    name: 타임소프트콘 (김기철, 오지석)

servers:
  - url: https://auction.company.internal/api/v1
    description: 운영 (예정)
  - url: http://localhost:3000/api/v1
    description: 로컬 개발

tags:
  - name: Auth
    description: SSO 인증·토큰
  - name: Self (Employee)
    description: 본인 데이터 조회 (ABAC 자기 검증 적용)
  - name: Auction
    description: 경매 조회·입찰
  - name: Admin - Employee
    description: 관리자의 직원 데이터 조회·적립 (RBAC=ADMIN)
  - name: Admin - Operations
    description: 경매 운영·EVENT 지급·설정 (RBAC=ADMIN)
  - name: Admin - Audit
    description: 감사·모니터링 (RBAC=ADMIN)
  - name: Internal
    description: 시스템 내부 호출 전용 (X-Internal-Token)

security:
  - bearerAuth: []

# ============================================================================
# Paths
# ============================================================================
paths:
  # ---- Auth ----
  /auth/sso/callback:
    get:
      tags: [Auth]
      summary: SSO 로그인 콜백
      security: []
      parameters:
        - in: query
          name: code
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 로그인 성공, 토큰 발급
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SsoLoginResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 액세스 토큰 갱신
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: 새 토큰 쌍
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/TokenPair' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ---- Self (Employee) ----
  /users/me/wallet:
    get:
      tags: [Self (Employee)]
      summary: 내 지갑 잔액 조회 (FR-5.2)
      parameters:
        - in: query
          name: currency
          schema: { type: string, default: WELFARE_POINT }
      responses:
        '200':
          description: 현재 잔액
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WalletBalance' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/me/ledger:
    get:
      tags: [Self (Employee)]
      summary: 내 거래 내역 조회 (FR-5.2)
      parameters:
        - $ref: '#/components/parameters/CurrencyQuery'
        - $ref: '#/components/parameters/ActionTypeQuery'
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: 거래 내역 (페이지네이션)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PaginatedLedger' }

  /users/me/leave-balance:
    get:
      tags: [Self (Employee)]
      summary: 내 휴가 잔액 조회
      parameters:
        - $ref: '#/components/parameters/YearQuery'
      responses:
        '200':
          description: 휴가 타입별 잔액
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/LeaveBalanceEntry' }

  /users/me/dividend:
    get:
      tags: [Self (Employee)]
      summary: 내 예상/확정 배당 조회
      parameters:
        - $ref: '#/components/parameters/YearQuery'
      responses:
        '200':
          description: 배당 정보
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/DividendInfo' }

  /users/me/stake:
    get:
      tags: [Self (Employee)]
      summary: 내 지분 조회
      parameters:
        - $ref: '#/components/parameters/YearQuery'
      responses:
        '200':
          description: Stake 정보
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/StakeInfo' }

  # ---- Auction ----
  /auctions:
    get:
      tags: [Auction]
      summary: 경매 목록 조회 (FR-2.1)
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/AuctionStatus'
        - $ref: '#/components/parameters/YearQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: 경매 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PaginatedAuctions' }

  /auctions/{id}:
    get:
      tags: [Auction]
      summary: 경매 상세 조회
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
      responses:
        '200':
          description: 경매 상세
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AuctionDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auctions/{id}/bids:
    post:
      tags: [Auction]
      summary: 입찰 (FR-2.1)
      description: |
        SQLite write 락(lockAuction) → wallet 차감 → 직전자 즉시 환불 → highest_bid 갱신 → LEDGER_ENTRY → WebSocket 브로드캐스트. 모두 단일 트랜잭션. scope-cuts CUT-1(ADR-006 Superseded)·ADR-018 참조.
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BidRequest' }
      responses:
        '200':
          description: 입찰 수락
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/BidResult' }
        '400':
          description: |
            - `POINT_INSUFFICIENT` — wallet 잔액 부족
            - `BID_TOO_LOW` — 현재가 + 최소 증분 미만
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '409':
          description: |
            - `AUCTION_CLOSED` — 마감된 경매
            - `INVALID_STATE_TRANSITION` — OPEN 상태가 아님
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

  /auctions/me/bids:
    get:
      tags: [Auction]
      summary: 내 입찰 이력 조회
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: 입찰 이력
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PaginatedMyBids' }

  # ---- Admin - Employee ----
  /admin/wallet:
    get:
      tags: [Admin - Employee]
      summary: 직원 지갑 조회 (관리자)
      parameters:
        - in: query
          name: userId
          required: true
          schema: { type: integer, format: int64 }
        - $ref: '#/components/parameters/CurrencyQuery'
      responses:
        '200':
          description: 직원 지갑 잔액
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WalletBalance' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/wallet/credit:
    post:
      tags: [Admin - Employee]
      summary: 직원 콘 적립 (FR-5.1)
      description: CREDIT_ADMIN 액션으로 LEDGER_ENTRY INSERT. reason 필수.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreditWalletRequest' }
      responses:
        '200':
          description: 적립 완료
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CreditWalletResult' }
        '400':
          description: |
            - `REASON_REQUIRED` — 사유 누락
            - `INVALID_AMOUNT` — amount ≤ 0
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/ledger:
    get:
      tags: [Admin - Audit]
      summary: 전체 거래 원장 감사 조회
      parameters:
        - in: query
          name: userId
          schema: { type: integer, format: int64 }
        - in: query
          name: auctionId
          schema: { type: integer, format: int64 }
        - $ref: '#/components/parameters/CurrencyQuery'
        - $ref: '#/components/parameters/ActionTypeQuery'
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: 거래 원장
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PaginatedLedger' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/leave-balance:
    get:
      tags: [Admin - Employee]
      summary: 직원 휴가 잔액 조회 (관리자)
      parameters:
        - in: query
          name: userId
          required: true
          schema: { type: integer, format: int64 }
        - $ref: '#/components/parameters/YearQuery'
      responses:
        '200':
          description: 휴가 잔액
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/LeaveBalanceEntry' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ---- Admin - Operations ----
  /admin/auctions/{id}/open:
    post:
      tags: [Admin - Operations]
      summary: 경매 수동 오픈 (분산 오픈 운영)
      description: OP-4 분산 오픈 배치의 수동 트리거. CREATED → OPEN 전이.
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
      responses:
        '200':
          description: 오픈 완료
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AuctionDetail' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: INVALID_STATE_TRANSITION
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

  /admin/auctions/{id}/event-grant:
    post:
      tags: [Admin - Operations]
      summary: 유찰 재고 EVENT 수동 지급 (FR-4.2)
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EventGrantRequest' }
      responses:
        '200':
          description: 지급 완료
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/EventGrantResult' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: INVALID_STATE_TRANSITION — UNSOLD 상태가 아님
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

  /admin/auctions/{id}/force-close:
    post:
      tags: [Admin - Operations]
      summary: 경매 강제 마감 (장애 대응)
      parameters:
        - $ref: '#/components/parameters/AuctionIdPath'
      responses:
        '200':
          description: 마감 완료
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AuctionDetail' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/config/bid-increment:
    put:
      tags: [Admin - Operations]
      summary: OP-3 최소 입찰 증분 설정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, currency]
              properties:
                amount:
                  type: integer
                  format: int64
                  minimum: 1
                currency:
                  type: string
                  default: WELFARE_POINT
      responses:
        '200': { description: 설정 완료 }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/config/weekly-open-quota:
    put:
      tags: [Admin - Operations]
      summary: OP-5 분산 오픈 주당 개수 설정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quota]
              properties:
                quota: { type: integer, minimum: 1 }
      responses:
        '200': { description: 설정 완료 }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/config/starting-price:
    put:
      tags: [Admin - Operations]
      summary: OP-6 시작가 모드·값 설정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [FREE, FIXED_MIN, PRIOR_YEAR_AVERAGE]
                value:
                  type: integer
                  description: FIXED_MIN 모드일 때만 사용
      responses:
        '200': { description: 설정 완료 }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ---- Admin - Audit ----
  /admin/escrow:
    get:
      tags: [Admin - Audit]
      summary: 에스크로 현황 조회 (NFR-2 정합성 검증 포함)
      parameters:
        - $ref: '#/components/parameters/YearQuery'
        - $ref: '#/components/parameters/CurrencyQuery'
      responses:
        '200':
          description: 에스크로 현황
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/EscrowInfo' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/outbox:
    get:
      tags: [Admin - Audit]
      summary: Outbox 상태 조회
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, SENT, DLQ]
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/SizeQuery'
      responses:
        '200':
          description: Outbox 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PaginatedOutbox' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/outbox/{id}/retry:
    post:
      tags: [Admin - Audit]
      summary: DLQ 항목 재시도
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: 재시도 큐 재진입 완료 }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---- Internal (System Token) ----
  /internal/batch/year-end-settlement:
    post:
      tags: [Internal]
      summary: 연말 풀 수집 배치 (FR-1.1, ADR-017)
      description: 스케줄러 또는 관리자 수동 호출. 재진입 가능(idempotent).
      security:
        - internalToken: []
      responses:
        '200': { description: 배치 완료 }
        '403': { $ref: '#/components/responses/Forbidden' }

  /internal/batch/dividend-distribution:
    post:
      tags: [Internal]
      summary: 연말 배당 배치 (FR-4.1)
      security:
        - internalToken: []
      responses:
        '200': { description: 배치 완료 }
        '403': { $ref: '#/components/responses/Forbidden' }

  /internal/batch/weekly-auction-open:
    post:
      tags: [Internal]
      summary: 주차별 경매 오픈 배치 (OP-4 분산 오픈)
      security:
        - internalToken: []
      responses:
        '200': { description: 오픈 완료 }
        '403': { $ref: '#/components/responses/Forbidden' }

  /internal/batch/close-expired-auctions:
    post:
      tags: [Internal]
      summary: end_time 경과 경매 일괄 마감
      security:
        - internalToken: []
      responses:
        '200': { description: 마감 완료 }
        '403': { $ref: '#/components/responses/Forbidden' }

  /internal/leave/deduct:
    post:
      tags: [Internal]
      summary: 휴가 차감 (FR-3.1 — 그룹웨어/Stub의 휴가 사용 승인 콜백)
      description: AUCTION → EVENT → REGULAR 우선순위 강제 차감. ADR-003.
      security:
        - internalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, days, year]
              properties:
                userId: { type: integer, format: int64 }
                days: { type: integer, minimum: 1 }
                year: { type: integer }
      responses:
        '200':
          description: 차감 완료
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/DeductionResult' }
        '400':
          description: INSUFFICIENT_LEAVE / INVALID_AMOUNT
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

# ============================================================================
# Components
# ============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalToken:
      type: apiKey
      in: header
      name: X-Internal-Token

  parameters:
    AuctionIdPath:
      in: path
      name: id
      required: true
      schema: { type: integer, format: int64 }
    YearQuery:
      in: query
      name: year
      schema: { type: integer, example: 2026 }
    CurrencyQuery:
      in: query
      name: currency
      schema: { type: string, default: WELFARE_POINT }
    ActionTypeQuery:
      in: query
      name: actionType
      schema:
        $ref: '#/components/schemas/ActionType'
    FromQuery:
      in: query
      name: from
      schema: { type: string, format: date-time }
    ToQuery:
      in: query
      name: to
      schema: { type: string, format: date-time }
    PageQuery:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    SizeQuery:
      in: query
      name: size
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }

  responses:
    Unauthorized:
      description: 토큰 없음/만료
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Forbidden:
      description: 권한 부족 (RBAC 또는 ABAC 검증 실패)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }

  schemas:
    # ---- 공통 봉투 ----
    ApiSuccess:
      type: object
      required: [success, data, timestamp]
      properties:
        success: { type: boolean, enum: [true] }
        data: { type: object, nullable: true }
        error: { type: object, nullable: true, example: null }
        timestamp: { type: string, format: date-time }

    ApiError:
      type: object
      required: [success, error, timestamp]
      properties:
        success: { type: boolean, enum: [false] }
        data: { type: object, nullable: true, example: null }
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                표준 에러 코드:
                - UNAUTHORIZED · FORBIDDEN · NOT_FOUND
                - POINT_INSUFFICIENT · BID_TOO_LOW · INVALID_STATE_TRANSITION
                - AUCTION_CLOSED
                - REASON_REQUIRED · INVALID_AMOUNT · USER_NOT_FOUND
                - HR_API_TIMEOUT · ESCROW_MISMATCH
                - INSUFFICIENT_LEAVE
            message: { type: string }
            details: { type: object, nullable: true }
        timestamp: { type: string, format: date-time }

    # ---- 열거형 ----
    AuctionStatus:
      type: string
      enum: [CREATED, OPEN, CLOSED, AWARDED, UNSOLD, EXPIRED]
      description: Auction 6상태 (ADR-014 State 패턴)

    LeaveType:
      type: string
      enum: [REGULAR, AUCTION, EVENT]

    ActionType:
      type: string
      enum: [BID, REFUND, WIN, DIVIDEND, CREDIT_ADMIN, EXPIRE]

    UserRole:
      type: string
      enum: [EMPLOYEE, ADMIN]

    # ---- 인증 ----
    SsoLoginResult:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        user: { $ref: '#/components/schemas/UserSummary' }

    TokenPair:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }

    UserSummary:
      type: object
      properties:
        userId: { type: integer, format: int64 }
        empId: { type: string }
        name: { type: string }
        role: { $ref: '#/components/schemas/UserRole' }

    # ---- 지갑·원장 ----
    WalletBalance:
      type: object
      required: [userId, currency, balance]
      properties:
        userId: { type: integer, format: int64 }
        currency: { type: string }
        balance: { type: integer, format: int64, minimum: 0 }
        updatedAt: { type: string, format: date-time }

    LedgerEntry:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        auctionId: { type: integer, format: int64, nullable: true }
        currency: { type: string }
        actionType: { $ref: '#/components/schemas/ActionType' }
        amount:
          type: integer
          format: int64
          description: 부호 포함 (+ 입금 / − 출금)
        escrowBalanceSnapshot: { type: integer, format: int64 }
        reason: { type: string, nullable: true }
        actorRole:
          type: string
          enum: [EMPLOYEE, ADMIN]
          description: BR-1 완화책. 관리자 행위 시 ADMIN 플래그
        createdAt: { type: string, format: date-time }

    PaginatedLedger:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/LedgerEntry' }
        total: { type: integer }
        page: { type: integer }
        size: { type: integer }

    CreditWalletRequest:
      type: object
      required: [userId, currency, amount, reason]
      properties:
        userId: { type: integer, format: int64 }
        currency: { type: string, default: WELFARE_POINT }
        amount: { type: integer, format: int64, minimum: 1 }
        reason:
          type: string
          minLength: 1
          example: "2026 Q2 분기 복지 콘 지급"

    CreditWalletResult:
      type: object
      properties:
        userId: { type: integer, format: int64 }
        currency: { type: string }
        creditedAmount: { type: integer, format: int64 }
        newBalance: { type: integer, format: int64 }
        ledgerEntryId: { type: integer, format: int64 }

    # ---- 휴가 ----
    LeaveBalanceEntry:
      type: object
      properties:
        leaveType: { $ref: '#/components/schemas/LeaveType' }
        allocated: { type: integer }
        used: { type: integer }
        remaining: { type: integer }

    DeductionResult:
      type: object
      properties:
        deductedFrom:
          type: array
          description: AUCTION → EVENT → REGULAR 순으로 차감 내역
          items:
            type: object
            properties:
              leaveType: { $ref: '#/components/schemas/LeaveType' }
              days: { type: integer }
        remainingTotal: { type: integer }

    # ---- 경매 ----
    AuctionSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        status: { $ref: '#/components/schemas/AuctionStatus' }
        year: { type: integer }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        highestBid: { type: integer, format: int64 }
        myCurrentBid:
          type: integer
          format: int64
          nullable: true
          description: 내가 현재 최고가 입찰자인 경우의 입찰액
        timeRemainingSec: { type: integer }

    AuctionDetail:
      allOf:
        - $ref: '#/components/schemas/AuctionSummary'
        - type: object
          properties:
            winnerId: { type: integer, format: int64, nullable: true }
            startingPrice: { type: integer, format: int64 }
            minBidIncrement: { type: integer, format: int64 }

    PaginatedAuctions:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AuctionSummary' }
        total: { type: integer }
        page: { type: integer }
        size: { type: integer }

    BidRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: integer
          format: int64
          minimum: 1
          description: 입찰 금액 (콘)

    BidResult:
      type: object
      properties:
        auctionId: { type: integer, format: int64 }
        acceptedAmount: { type: integer, format: int64 }
        newHighestBid: { type: integer, format: int64 }
        refundedPreviousBidder:
          type: integer
          format: int64
          nullable: true
          description: 즉시 환불된 직전 최고가 입찰자 ID (ADR-018)

    MyBid:
      type: object
      properties:
        auctionId: { type: integer, format: int64 }
        amount: { type: integer, format: int64 }
        isCurrentHighest: { type: boolean }
        createdAt: { type: string, format: date-time }

    PaginatedMyBids:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/MyBid' }
        total: { type: integer }
        page: { type: integer }

    # ---- 배당·지분 ----
    DividendInfo:
      type: object
      properties:
        year: { type: integer }
        stakeRatio: { type: number, format: double }
        estimatedDividend:
          type: integer
          format: int64
          description: 현재 에스크로 기준 예상액 (확정 전)
        finalDividend:
          type: integer
          format: int64
          nullable: true
        status:
          type: string
          enum: [PENDING, FINALIZED, PAID]

    StakeInfo:
      type: object
      properties:
        year: { type: integer }
        contributedDays: { type: integer }
        stakeRatio: { type: number, format: double }

    # ---- 관리자 운영 ----
    EventGrantRequest:
      type: object
      required: [empId, reason]
      properties:
        empId: { type: string }
        reason: { type: string, minLength: 1 }

    EventGrantResult:
      type: object
      properties:
        auctionId: { type: integer, format: int64 }
        recipientUserId: { type: integer, format: int64 }
        leaveType: { type: string, enum: [EVENT] }
        granted: { type: integer, example: 1 }

    EscrowInfo:
      type: object
      properties:
        year: { type: integer }
        currency: { type: string }
        balance:
          type: integer
          format: int64
          description: 캐시 테이블 (escrow.balance)
        computedBalance:
          type: integer
          format: int64
          description: ledger_entry 재계산 (escrow_audit_view)
        isConsistent:
          type: boolean
          description: balance == computedBalance
        totalBidCount: { type: integer }
        totalWinnerCount: { type: integer }

    # ---- Outbox ----
    OutboxEntry:
      type: object
      properties:
        id: { type: integer, format: int64 }
        idempotencyKey: { type: string }
        aggregateType: { type: string }
        aggregateId: { type: integer, format: int64 }
        status:
          type: string
          enum: [PENDING, SENT, DLQ]
        retryCount: { type: integer }
        lastError: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        sentAt: { type: string, format: date-time, nullable: true }

    PaginatedOutbox:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/OutboxEntry' }
        total: { type: integer }
        page: { type: integer }

# ============================================================================
# 비고
# ============================================================================
# - 본 스펙은 v0.1 — Swagger UI 통합·codegen 검증 후 v1.0으로 승격
# - WebSocket 채널(`/ws/auctions/{id}`)은 별도 문서로 명세 (OpenAPI는 REST 전용)
# - HR 시스템(`POST {HR_BASE}/api/hr/*`)은 본 시스템의 *Outbound* 호출이므로 별도 문서
# - 권한 검증은 permission-matrix.md 1:1 매핑
# - 인수 조건은 acceptance-criteria.md FR-x.x 참조
