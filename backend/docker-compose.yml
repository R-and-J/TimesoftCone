services:
  mysql:
    image: mysql:8
    container_name: timesoftcone-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: timesoftcone
      MYSQL_DATABASE: timesoftcone
      MYSQL_USER: timesoftcone
      MYSQL_PASSWORD: timesoftcone
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: timesoftcone-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysqldata:
  redisdata:
